<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0b" />
    <title>NanaMeets | Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(233, 64, 87, 0.18), transparent 35%),
          linear-gradient(180deg, #111111 0%, #060606 100%);
        color: #f8fafc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(8, 8, 8, 0.88);
        padding: 28px;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(18px);
      }

      .logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 14px 30px rgba(233, 64, 87, 0.22);
      }

      h1 {
        margin: 20px 0 12px;
        font-size: clamp(1.8rem, 5vw, 2.8rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: rgba(248, 250, 252, 0.76);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .primary {
        background: #e94057;
        color: white;
      }

      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: white;
        background: rgba(255, 255, 255, 0.04);
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="/Fav-Icon.svg" alt="NanaMeets" />
      <h1>You&apos;re offline right now.</h1>
      <p>
        NanaMeets needs a connection for messages, profile updates, and payments. Reconnect and
        reload to continue.
      </p>
      <div class="actions">
        <a class="primary" href="/">Go home</a>
        <a class="secondary" href="/privacy">Privacy</a>
      </div>
    </main>
  </body>
</html>
